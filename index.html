<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Ads Smart Budgeting Dashboard</title>
    
    <!-- React & ReactDOM Production CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for Browser JSX Transpiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap');
        body {
            font-family: 'Sarabun', sans-serif;
        }
        /* ซ่อนลูกศรของ input type="number" เพื่อความสะอาดตา */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <!-- Root element for React mount -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // SVG Icons
        const IconRefreshCw = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 11H18M9 7h1v10H9m4-10h1v10h-1" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M4 4a9 9 0 0113.824-2.824L21 4v5h-5" />
          </svg>
        );

        const IconFileText = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        );

        const IconEdit2 = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />

        const IconTrash2 = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />

        const IconSave = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
          </svg>

        const IconPlus = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
          </svg>
        );

        const IconCalendar = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 00-2 2z" />
          </svg>
        );

        const IconDollarSign = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        );

        const IconTrendingUp = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
          </svg>
        );

        const IconFlame = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        );

        const IconAlertCircle = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        );

        const IconX = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        );

        const DEFAULT_PRESETS = {
          normalShop: 3000,
          normalBanner: 1000,
          ddayShop: 10000,
          ddayBanner: 2000,
          midMonthShop: 3000,
          midMonthBanner: 1000,
          paydayShop: 10000,
          paydayBanner: 2000
        };

        const INITIAL_DAYS_DATA_RAW = [
          { date: 1, type: 'Normal', shopTarget: 5000, shopActual: 5000, bannerTarget: 1000, bannerActual: 0, isCompleted: true },
          { date: 2, type: 'Normal', shopTarget: 5000, shopActual: 5000, bannerTarget: 1000, bannerActual: 0, isCompleted: true },
          { date: 3, type: 'MidMonth', shopTarget: 5700, shopActual: 5700, bannerTarget: 1000, bannerActual: 0, isCompleted: true },
          { date: 4, type: 'Normal', shopTarget: 6300, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 5, type: 'D-Day', shopTarget: 10000, shopActual: 0, bannerTarget: 2000, bannerActual: 0, isCompleted: false },
          { date: 6, type: 'D-Day', shopTarget: 10000, shopActual: 0, bannerTarget: 2000, bannerActual: 0, isCompleted: false },
          { date: 7, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 8, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 9, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 10, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 11, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 12, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 13, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 14, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 15, type: 'MidMonth', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 16, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 17, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 18, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 19, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 20, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 21, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 22, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 23, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 24, type: 'Payday', shopTarget: 10000, shopActual: 0, bannerTarget: 2000, bannerActual: 0, isCompleted: false },
          { date: 25, type: 'Payday', shopTarget: 10000, shopActual: 0, bannerTarget: 2000, bannerActual: 0, isCompleted: false },
          { date: 26, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 27, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 28, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 29, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 30, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
          { date: 31, type: 'Normal', shopTarget: 3000, shopActual: 0, bannerTarget: 1000, bannerActual: 0, isCompleted: false },
        ];

        const INITIAL_DAYS_DATA = INITIAL_DAYS_DATA_RAW.map(d => ({
          ...d,
          originalShopTarget: d.shopTarget,
          originalBannerTarget: d.bannerTarget,
          shopTarget: d.isCompleted ? d.shopActual : d.shopTarget,
          bannerTarget: d.isCompleted ? d.bannerActual : d.bannerTarget
        }));

        function App() {
          const [days, setDays] = useState(INITIAL_DAYS_DATA);
          const [presets, setPresets] = useState(DEFAULT_PRESETS);
          const [selectedMonth, setSelectedMonth] = useState('03'); // มีนาคม (3.3) เป็นดีฟอลต์
          const [daysCount, setDaysCount] = useState(31);

          // Saved Plans system
          const [plans, setPlans] = useState([
            {
              id: 'default-march',
              name: 'แผนหลัก มีนาคม (3.3 Campaign)',
              month: '03',
              presets: { ...DEFAULT_PRESETS },
              days: [...INITIAL_DAYS_DATA]
            },
            {
              id: 'example-april',
              name: 'แผนเมษายน (4.4 Splash Sales)',
              month: '04',
              presets: { ...DEFAULT_PRESETS, normalShop: 3500, ddayShop: 12000 },
              days: INITIAL_DAYS_DATA.slice(0, 30).map(d => ({
                ...d,
                shopTarget: d.type === 'D-Day' ? 12000 : d.type === 'Normal' ? 3500 : d.shopTarget,
                originalShopTarget: d.type === 'D-Day' ? 12000 : d.type === 'Normal' ? 3500 : d.shopTarget,
                shopActual: 0,
                bannerActual: 0,
                isCompleted: false
              }))
            }
          ]);
          const [selectedPlanId, setSelectedPlanId] = useState('default-march');

          // Custom Modal States
          const [isSaveModalOpen, setIsSaveModalOpen] = useState(false);
          const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
          const [isRenameModalOpen, setIsRenameModalOpen] = useState(false);
          const [isResetConfirmOpen, setIsResetConfirmOpen] = useState(false);
          
          const [planToRename, setPlanToRename] = useState(null);
          const [planToDelete, setPlanToDelete] = useState(null);
          const [newPlanName, setNewPlanName] = useState('');
          const [renameValue, setRenameValue] = useState('');

          useEffect(() => {
            const daysInMonths = { '02': 28, '04': 30, '06': 30, '09': 30, '11': 30 };
            const count = daysInMonths[selectedMonth] || 31;
            setDaysCount(count);
            
            setDays(prev => {
              if (prev.length < count) {
                const added = Array.from({ length: count - prev.length }, (_, i) => {
                  const dayNum = prev.length + i + 1;
                  const initialShop = presets.normalShop;
                  const initialBanner = presets.normalBanner;
                  return {
                    date: dayNum,
                    type: getDayTypeByRule(dayNum, selectedMonth),
                    shopTarget: initialShop,
                    originalShopTarget: initialShop,
                    shopActual: 0,
                    bannerTarget: initialBanner,
                    originalBannerTarget: initialBanner,
                    bannerActual: 0,
                    isCompleted: false
                  };
                });
                return [...prev, ...added];
              } else {
                return prev.slice(0, count);
              }
            });
          }, [selectedMonth]);

          const getDayTypeByRule = (day, month) => {
            const doubleDigit = parseInt(month, 10);
            if (day === doubleDigit) return 'D-Day';
            if (day >= 24 && day <= 26) return 'Payday';
            if (day === 15) return 'MidMonth';
            return 'Normal';
          };

          const handleCellChange = (date, field, value) => {
            const numericValue = value === '' ? 0 : Math.max(0, parseInt(value, 10) || 0);
            setDays(prev => prev.map(day => {
              if (day.date === date) {
                const updated = { ...day, [field]: numericValue };
                
                if (field === 'shopTarget') {
                  updated.originalShopTarget = numericValue;
                }
                if (field === 'bannerTarget') {
                  updated.originalBannerTarget = numericValue;
                }

                // สวิตช์อัตโนมัติเมื่อผู้ใช้ป้อนยอดใช้จริง
                if (field === 'shopActual' || field === 'bannerActual') {
                  const hasActualSpent = (updated.shopActual > 0 || updated.bannerActual > 0);
                  
                  // บันทึกสถานะเสร็จสิ้น
                  updated.isCompleted = hasActualSpent;
                  
                  if (updated.isCompleted) {
                    // ปรับค่าเป้าหมาย Target ให้เท่ากับยอดใช้จริง แม้ว่าจะเป็น 0 ก็ตาม
                    updated.shopTarget = updated.shopActual;
                    updated.bannerTarget = updated.bannerActual;
                  } else {
                    // กู้คืนค่าเป้าหมายเดิม (Original Target) หากเคลียร์ยอดจริงออก
                    updated.shopTarget = updated.originalShopTarget;
                    updated.bannerTarget = updated.originalBannerTarget;
                  }
                }
                return updated;
              }
              return day;
            }));
          };

          const applyPresetToSelectedTypes = (type) => {
            setDays(prev => prev.map(day => {
              if (day.type === type) {
                if (day.isCompleted) return day;

                let shopTarget = day.shopTarget;
                let bannerTarget = day.bannerTarget;
                
                if (type === 'D-Day') {
                  shopTarget = presets.ddayShop;
                  bannerTarget = presets.ddayBanner;
                } else if (type === 'MidMonth') {
                  shopTarget = presets.midMonthShop;
                  bannerTarget = presets.midMonthBanner;
                } else if (type === 'Payday') {
                  shopTarget = presets.paydayShop;
                  bannerTarget = presets.paydayBanner;
                } else {
                  shopTarget = presets.normalShop;
                  bannerTarget = presets.normalBanner;
                }

                return { 
                  ...day, 
                  shopTarget, 
                  originalShopTarget: shopTarget, 
                  bannerTarget, 
                  originalBannerTarget: bannerTarget 
                };
              }
              return day;
            }));
          };

          const applyAllPresets = () => {
            setDays(prev => prev.map(day => {
              if (day.isCompleted) return day;

              let shopTarget = presets.normalShop;
              let bannerTarget = presets.normalBanner;
              
              if (day.type === 'D-Day') {
                shopTarget = presets.ddayShop;
                bannerTarget = presets.ddayBanner;
              } else if (day.type === 'MidMonth') {
                shopTarget = presets.midMonthShop;
                bannerTarget = presets.midMonthBanner;
              } else if (day.type === 'Payday') {
                shopTarget = presets.paydayShop;
                bannerTarget = presets.paydayBanner;
              }

              return { 
                ...day, 
                shopTarget, 
                originalShopTarget: shopTarget, 
                bannerTarget, 
                originalBannerTarget: bannerTarget 
              };
            }));
          };

          const confirmResetActuals = () => {
            setDays(prev => prev.map(day => ({
              ...day,
              shopActual: 0,
              bannerActual: 0,
              shopTarget: day.originalShopTarget,
              bannerTarget: day.originalBannerTarget,
              isCompleted: false
            })));
            setIsResetConfirmOpen(false);
          };

          const calculations = useMemo(() => {
            let totalShopTarget = 0;
            let totalShopActual = 0;
            let totalBannerTarget = 0;
            let totalBannerActual = 0;
            let completedDaysCount = 0;

            days.forEach(day => {
              totalShopTarget += day.shopTarget;
              totalBannerTarget += day.bannerTarget;
              
              if (day.isCompleted) {
                totalShopActual += day.shopActual;
                totalBannerActual += day.bannerActual;
                completedDaysCount++;
              }
            });

            const totalTarget = totalShopTarget + totalBannerTarget;
            const totalActual = totalShopActual + totalBannerActual;
            const spentPercent = totalTarget > 0 ? (totalActual / totalTarget) * 100 : 0;
            const remainingBudget = Math.max(0, totalTarget - totalActual);
            const remainingDaysCount = daysCount - completedDaysCount;

            let cumulativeOriginalPlannedSoFar = 0;
            days.forEach(day => {
              if (day.isCompleted) {
                cumulativeOriginalPlannedSoFar += (day.originalShopTarget + day.originalBannerTarget);
              }
            });

            const pacingGap = cumulativeOriginalPlannedSoFar - totalActual;
            const recommendedDailySpend = remainingDaysCount > 0 ? remainingBudget / remainingDaysCount : 0;

            return {
              totalShopTarget,
              totalShopActual,
              totalBannerTarget,
              totalBannerActual,
              totalTarget,
              totalActual,
              spentPercent,
              remainingBudget,
              completedDaysCount,
              remainingDaysCount,
              cumulativeOriginalPlannedSoFar,
              pacingGap,
              recommendedDailySpend
            };
          }, [days, daysCount]);

          const handleLoadPlan = (planId) => {
            const selectedPlan = plans.find(p => p.id === planId);
            if (selectedPlan) {
              setSelectedPlanId(planId);
              setSelectedMonth(selectedPlan.month);
              setPresets(selectedPlan.presets);
              setDays(selectedPlan.days);
            }
          };

          const handleSaveAsNewPlan = () => {
            if (!newPlanName.trim()) return;
            const newId = 'plan-' + Date.now();
            const newPlan = {
              id: newId,
              name: newPlanName.trim(),
              month: selectedMonth,
              presets: { ...presets },
              days: [...days]
            };
            setPlans(prev => [...prev, newPlan]);
            setSelectedPlanId(newId);
            setNewPlanName('');
            setIsSaveModalOpen(false);
          };

          const handleQuickSaveCurrent = () => {
            setPlans(prev => prev.map(p => {
              if (p.id === selectedPlanId) {
                return {
                  ...p,
                  month: selectedMonth,
                  presets: { ...presets },
                  days: [...days]
                };
              }
              return p;
            }));
          };

          const handleOpenRenameModal = (plan) => {
            setPlanToRename(plan);
            setRenameValue(plan.name);
            setIsRenameModalOpen(true);
          };

          const handleSaveRename = () => {
            if (!renameValue.trim() || !planToRename) return;
            setPlans(prev => prev.map(p => {
              if (p.id === planToRename.id) {
                return { ...p, name: renameValue.trim() };
              }
              return p;
            }));
            setPlanToRename(null);
            setIsRenameModalOpen(false);
          };

          const handleOpenDeleteModal = (plan) => {
            setPlanToDelete(plan);
            setIsDeleteModalOpen(true);
          };

          const handleConfirmDelete = () => {
            if (!planToDelete) return;
            const filteredPlans = plans.filter(p => p.id !== planToDelete.id);
            setPlans(filteredPlans);
            
            if (selectedPlanId === planToDelete.id && filteredPlans.length > 0) {
              handleLoadPlan(filteredPlans[0].id);
            }
            setPlanToDelete(null);
            setIsDeleteModalOpen(false);
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-6 font-sans">
              <div className="max-w-7xl mx-auto space-y-4">
                
                {/* Header Block */}
                <header className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white border border-slate-200 rounded-2xl p-5 shadow-sm gap-4">
                  <div className="space-y-1">
                    <div className="flex items-center gap-2">
                      <span className="p-1.5 bg-orange-600 rounded-lg text-white font-black text-xs tracking-wider">SHOPEE</span>
                      <h1 className="text-xl font-extrabold text-slate-900 tracking-tight">Smart Budget Planner</h1>
                    </div>
                    <p className="text-slate-500 text-xs">เครื่องมือจัดสรรงบแอดรายวัน สำหรับกระตุ้นยอดขายพร้อมระบบเกลี่ยเงินอัตโนมัติ</p>
                  </div>
                  
                  <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    {/* Month selector */}
                    <div className="bg-slate-100 p-1.5 rounded-xl flex items-center border border-slate-200 text-xs">
                      <span className="px-2 text-slate-500 font-medium">เลือกเดือน:</span>
                      <select 
                        value={selectedMonth} 
                        onChange={(e) => setSelectedMonth(e.target.value)}
                        className="bg-white border border-slate-200 text-orange-600 font-bold focus:ring-1 focus:ring-orange-500 rounded-lg cursor-pointer py-1 px-2"
                      >
                        <option value="01">มกราคม (1.1)</option>
                        <option value="02">กุมภาพันธ์ (2.2)</option>
                        <option value="03">มีนาคม (3.3)</option>
                        <option value="04">เมษายน (4.4)</option>
                        <option value="05">พฤษภาคม (5.5)</option>
                        <option value="06">มิถุนายน (6.6)</option>
                        <option value="07">กรกฎาคม (7.7)</option>
                        <option value="08">สิงหาคม (8.8)</option>
                        <option value="09">กันยายน (9.9)</option>
                        <option value="10">ตุลาคม (10.10)</option>
                        <option value="11">พฤศจิกายน (11.11)</option>
                        <option value="12">ธันวาคม (12.12)</option>
                      </select>
                    </div>
                    
                    {/* Reset button */}
                    <button 
                      onClick={() => setIsResetConfirmOpen(true)}
                      className="px-3 py-1.5 text-xs bg-white hover:bg-red-50 border border-slate-200 text-red-600 hover:border-red-300 transition duration-150 rounded-xl flex items-center gap-2 font-semibold shadow-sm ml-auto md:ml-0"

                                  disabled={day.isCompleted}
                                  onChange={(e) => handleCellChange(day.date, 'bannerTarget', e.target.value)}
                                  className="w-full bg-white border border-slate-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg px-2 py-0.5 text-right text-slate-800 font-semibold disabled:bg-slate-50 disabled:text-slate-500"
                                />
                                {day.isCompleted && day.bannerTarget !== day.originalBannerTarget && (
                                  <div className="text-[10px] text-slate-400 text-right mt-0.5 pr-1 font-medium">
                                    แผนเดิม: ฿{day.originalBannerTarget.toLocaleString()}
                                  </div>
                                )}
                              </td>

                              {/* Banner Actual */}
                              <td className="py-1.5 px-2 bg-orange-50/10">
                                <input
                                  type="text"
                                  value={day.bannerActual === 0 ? '' : day.bannerActual}
                                  placeholder="0"
                                  onChange={(e) => handleCellChange(day.date, 'bannerActual', e.target.value)}
                                  className="w-full bg-white border border-slate-300 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 rounded-lg px-2 py-0.5 text-right text-orange-600 font-extrabold"
                                />
                              </td>

                              {/* Total Target */}
                              <td className="py-2.5 px-3 text-right font-semibold text-slate-700 border-l border-slate-150 bg-slate-50/30">
                                ฿{dayTotalTarget.toLocaleString()}
                              </td>

                              {/* Total Actual */}
                              <td className="py-2.5 px-3 text-right font-bold text-slate-900 bg-slate-50/30">
                                {day.isCompleted ? `฿${dayTotalActual.toLocaleString()}` : '฿0'}
                              </td>

                              {/* Variance against original target */}
                              <td className="py-2.5 px-3 text-right bg-slate-50/30">
                                {day.isCompleted ? (
                                  variance === 0 ? (
                                    <span className="text-slate-400 font-medium">สอดคล้องเป้า</span>
                                  ) : variance < 0 ? (
                                    <span className="text-emerald-600 font-bold">-{Math.abs(variance).toLocaleString()} (ประหยัดแอด)</span>
                                  ) : (
                                    <span className="text-rose-600 font-bold text-xs">+{variance.toLocaleString()} (แอดล้นแผน)</span>
                                  )
                                ) : (
                                  <span className="text-slate-400 font-light">-</span>
                                )}
                              </td>

                              {/* Status Button Toggle */}
                              <td className="py-2.5 px-3 text-center">
                                <button
                                  onClick={() => {
                                    setDays(prev => prev.map(d => {
                                      if (d.date === day.date) {
                                        const nextCompleted = !d.isCompleted;
                                        return {
                                          ...d,
                                          isCompleted: nextCompleted,
                                          // ปรับค่า Target ให้เท่ากับ Actual ทันที (แม้ว่าจะเป็น 0) หากยกเลิกจะกู้คืนค่า Original
                                          shopTarget: nextCompleted ? d.shopActual : d.originalShopTarget,
                                          bannerTarget: nextCompleted ? d.bannerActual : d.originalBannerTarget,
                                        };
                                      }
                                      return d;
                                    }));
                                  }}
                                  className={`px-3 py-1 rounded-full text-[10px] font-bold tracking-wide transition-all ${
                                    day.isCompleted 
                                      ? 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200' 
                                      : 'bg-slate-100 text-slate-400 hover:text-slate-600 hover:bg-slate-200'
                                  }`}
                                >
                                  {day.isCompleted ? '✓ บันทึกแล้ว' : 'ค้างบันทึก'}
                                </button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>

                      {/* TFoot totals */}
                      <tfoot className="bg-slate-100 border-t border-slate-200 font-bold text-slate-700 text-xs">
                        <tr>
                          <td className="py-4 px-3 text-center text-slate-900 font-extrabold">รวม</td>
                          <td className="py-4 px-3"></td>
                          <td className="py-4 px-3 text-right bg-blue-50/50 text-blue-800 text-xs font-extrabold">฿{calculations.totalShopTarget.toLocaleString()}</td>
                          <td className="py-4 px-3 text-right bg-orange-50/50 text-orange-800 text-xs font-extrabold">฿{calculations.totalShopActual.toLocaleString()}</td>
                          <td className="py-4 px-3 text-right bg-blue-50/50 text-blue-800 text-xs font-extrabold">฿{calculations.totalBannerTarget.toLocaleString()}</td>
                          <td className="py-4 px-3 text-right bg-orange-50/50 text-orange-800 text-xs font-extrabold">฿{calculations.totalBannerActual.toLocaleString()}</td>
                          <td className="py-4 px-3 text-right text-slate-900 text-xs border-l border-slate-200 font-extrabold">฿{calculations.totalTarget.toLocaleString()}</td>
                          <td className="py-4 px-3 text-right text-orange-600 text-xs font-extrabold">฿{calculations.totalActual.toLocaleString()}</td>
                          <td className="py-4 px-3 text-right text-xs">
                            {calculations.pacingGap >= 0 ? (
                              <span className="text-purple-700">งบส่วนต่างบวก: ฿{calculations.pacingGap.toLocaleString()}</span>
                            ) : (
                              <span className="text-rose-700">งบส่วนต่างติดลบ: ฿{Math.abs(calculations.pacingGap).toLocaleString()}</span>
                            )}
                          </td>
                          <td className="py-4 px-3"></td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>
                </section>

                {/* Dynamic tips section */}
                <footer className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-slate-500 text-[11px] space-y-2">
                  <h4 className="font-bold text-slate-800 text-xs flex items-center gap-1">
                    <span className="text-orange-500">💡</span> คำชี้แจงระบบเกลี่ยเงินโฆษณาสะสม (Roll-Over Campaign Strategy):
                  </h4>
                  <p>• เมื่อทำการ <strong>"บันทึกแล้ว"</strong> ระบบจะปรับ <strong>Shop Ads Target / Banner Target</strong> ของวันนั้นให้เท่ากับยอดจ่ายจริงโดยอัตโนมัติ เพื่อรักษาความเป็นระเบียบและสอดคล้องกับงบจริงที่เกิดขึ้น</p>
                  <p>• ระบบจำยอดแผนเดิม (Original Target) ไว้ในฐานข้อมูลเบื้องหลัง เพื่อใช้คำนวณ <strong>งบประหยัดสะสม (Roll-Over)</strong> ส่งผลให้ "เฉลี่ยงบที่เหลือ (แนะนำ)" ยังสามารถเกลี่ยเงินได้อย่างแม่นยำ 100% โดยไม่อิงตามตารางที่แปรผันไป</p>
                </footer>

              </div>

              {/* ==========================================
                  CUSTOM MODAL WINDOWS
                 ========================================== */}

              {/* Modal: Save as New Plan */}
              {isSaveModalOpen && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50 animate-fade-in">
                  <div className="bg-white rounded-2xl max-w-md w-full border border-slate-200 p-6 shadow-xl space-y-4">
                    <div className="flex justify-between items-center border-b border-slate-100 pb-2">
                      <h3 className="font-black text-slate-900 text-sm">สร้างแผนงบประมาณใหม่</h3>
                      <button onClick={() => setIsSaveModalOpen(false)} className="text-slate-400 hover:text-slate-600 transition">
                        <IconX className="w-5 h-5" />
                      </button>
                    </div>
                    <div className="space-y-2">
                      <label className="text-xs text-slate-500 font-bold block">ระบุชื่อแผนงบประมาณใหม่ของคุณ</label>
                      <input
                        type="text"
                        placeholder="เช่น แผนโฆษณาพฤษภาคม 5.5..."
                        value={newPlanName}
                        onChange={(e) => setNewPlanName(e.target.value)}
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1 focus:ring-orange-500 focus:bg-white text-slate-800 font-medium"
                      />
                    </div>
                    <div className="flex justify-end gap-2 text-xs font-bold pt-2">
                      <button
                        onClick={() => setIsSaveModalOpen(false)}
                        className="px-4 py-2 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition"
                      >
                        ยกเลิก
                      </button>
                      <button
                        onClick={handleSaveAsNewPlan}
                        disabled={!newPlanName.trim()}
                        className="px-4 py-2 bg-orange-600 text-white rounded-xl hover:bg-orange-700 disabled:opacity-50 transition"
                      >
                        บันทึกแผนใหม่
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal: Rename Plan */}
              {isRenameModalOpen && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl max-w-md w-full border border-slate-200 p-6 shadow-xl space-y-4">
                    <div className="flex justify-between items-center border-b border-slate-100 pb-2">
                      <h3 className="font-black text-slate-900 text-sm">แก้ไขชื่อแผน</h3>
                      <button onClick={() => setIsRenameModalOpen(false)} className="text-slate-400 hover:text-slate-600 transition">
                        <IconX className="w-5 h-5" />
                      </button>
                    </div>
                    <div className="space-y-2">
                      <label className="text-xs text-slate-500 font-bold block">ชื่อแผนเดิม: <span className="font-semibold text-slate-800">{planToRename?.name}</span></label>
                      <input
                        type="text"
                        placeholder="ระบุชื่อใหม่ที่นี่..."
                        value={renameValue}
                        onChange={(e) => setRenameValue(e.target.value)}
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1 focus:ring-orange-500 focus:bg-white text-slate-800 font-medium"
                      />
                    </div>
                    <div className="flex justify-end gap-2 text-xs font-bold pt-2">
                      <button
                        onClick={() => setIsRenameModalOpen(false)}
                        className="px-4 py-2 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition"
                      >
                        ยกเลิก
                      </button>
                      <button
                        onClick={handleSaveRename}
                        disabled={!renameValue.trim()}
                        className="px-4 py-2 bg-orange-600 text-white rounded-xl hover:bg-orange-700 disabled:opacity-50 transition"
                      >
                        ยืนยันการเปลี่ยนชื่อ
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal: Delete Confirmation */}
              {isDeleteModalOpen && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl max-w-md w-full border border-slate-200 p-6 shadow-xl space-y-4">
                    <div className="flex justify-between items-center border-b border-red-50 pb-2">
                      <h3 className="font-black text-red-600 text-sm flex items-center gap-1">⚠️ ยืนยันการลบแผน</h3>
                      <button onClick={() => setIsDeleteModalOpen(false)} className="text-slate-400 hover:text-slate-600 transition">
                        <IconX className="w-5 h-5" />
                      </button>
                    </div>
                    <p className="text-xs text-slate-600 leading-relaxed">
                      คุณแน่ใจหรือไม่ที่จะลบแผนโฆษณา <strong className="text-slate-900">"{planToDelete?.name}"</strong>? <br />
                      การลบนี้จะทำให้ข้อมูลแผนที่บันทึกไว้หายไปอย่างถาวรและไม่สามารถเรียกคืนได้
                    </p>
                    <div className="flex justify-end gap-2 text-xs font-bold pt-2">
                      <button
                        onClick={() => setIsDeleteModalOpen(false)}
                        className="px-4 py-2 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition"
                      >
                        ยกเลิก
                      </button>
                      <button
                        onClick={handleConfirmDelete}
                        className="px-4 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 transition"
                      >
                        ใช่, ฉันต้องการลบแผนนี้
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal: Reset Confirmation */}
              {isResetConfirmOpen && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-2xl max-w-md w-full border border-slate-200 p-6 shadow-xl space-y-4">
                    <div className="flex justify-between items-center border-b border-red-50 pb-2">
                      <h3 className="font-black text-red-600 text-sm flex items-center gap-1">⚠️ ยืนยันการเคลียร์ข้อมูล</h3>
                      <button onClick={() => setIsResetConfirmOpen(false)} className="text-slate-400 hover:text-slate-600 transition">
                        <IconX className="w-5 h-5" />
                      </button>
                    </div>
                    <p className="text-xs text-slate-600 leading-relaxed">
                      คุณแน่ใจหรือไม่ที่จะล้างข้อมูล <strong className="text-slate-900">"ยอดใช้จริงทั้งหมด (Actual Spent)"</strong> และสลับสถานะทุกวันกลับไปเป็น "ค้างบันทึก"? <br />
                      ระบบจะกู้คืนค่าเป้าหมายเดิม (Original Target) ของคุณให้ในทุกวันของเดือนนี้โดยอัตโนมัติ
                    </p>
                    <div className="flex justify-end gap-2 text-xs font-bold pt-2">
                      <button
                        onClick={() => setIsResetConfirmOpen(false)}
                        className="px-4 py-2 border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 transition"
                      >
                        ยกเลิก
                      </button>
                      <button
                        onClick={confirmResetActuals}
                        className="px-4 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 transition"
                      >
                        ใช่, ล้างข้อมูลจริงทั้งหมด
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
